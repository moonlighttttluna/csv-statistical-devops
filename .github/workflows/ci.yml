name: Python Data Pipeline CI

# This triggers the workflow every time you push a change or a CSV to GitHub
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure pandas and pytest are installed even if requirements.txt is missing
        pip install pandas pytest

    - name: Run Tests with Pytest
      # We set PYTHONPATH so Python can find the 'processors' folder
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest

    - name: Run Data Pipeline
      # This executes your main.py and generates the files in the /output folder
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python main.py

    - name: Upload Results as Artifacts
      # This is the CRITICAL step that saves the 'output' folder for you to download
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: student-grade-analysis-results
        path: output/
        retention-days: 5
