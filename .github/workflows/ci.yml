name: Python Data Pipeline with Testing & Visualization

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'output/**' # Prevents infinite loops when the bot pushes files

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added matplotlib here so your charts can be generated
        pip install pandas pytest matplotlib

    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest

    - name: Run Data Pipeline
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python main.py

    - name: Commit and Push Output
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # This ensures the output folder and all new CSVs/PNGs are added
        git add output/
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update: Statistical results and visualizations"
          git push
        fi
