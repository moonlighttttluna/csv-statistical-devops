name: Python Data Pipeline with Auto-Commit

on:
  push:
    branches: [ "main" ]
    # This prevents an "infinite loop" where the bot's own commit 
    # triggers another build.
    paths-ignore:
      - 'output/**'

jobs:
  build:
    runs-on: ubuntu-latest
    # We need "write" permissions to push files back to the repo
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install pandas pytest

    - name: Run Data Pipeline
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python main.py

    - name: Commit and Push Output
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add the output folder to git
        git add output/
        
        # Only commit if there are actually changes to avoid errors
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-generated: Updated statistical analysis"
          git push
        fi
